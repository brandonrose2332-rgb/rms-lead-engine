<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Referral Admin — RMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
    --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
    --text:#1a1917;--muted:#6b6a66;--hint:#9e9d99;
    --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
    --green-bg:#EAF3DE;--green-text:#3B6D11;
    --amber-bg:#FAEEDA;--amber-text:#854F0B;
    --gray-bg:#F1EFE8;--gray-text:#5F5E5A;
    --red-bg:#FCEBEB;--red-text:#A32D2D;--red-border:#F09595;
    --purple-bg:#EEEDFE;--purple-text:#534AB7;
    --teal-bg:#E1F5EE;--teal-text:#0F6E56;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:1040px;margin:0 auto;padding:2rem 1.25rem 4rem;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
  .logo{display:flex;align-items:baseline;gap:6px;}
  .logo-rms{font-size:13px;font-weight:600;letter-spacing:0.08em;color:var(--blue);text-transform:uppercase;background:var(--blue-light);padding:3px 8px;border-radius:5px;}
  .logo-name{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
  .logo-page{font-size:14px;color:var(--muted);margin-left:4px;}
  .header-actions{display:flex;gap:8px;align-items:center;}
  .btn-ghost{height:32px;padding:0 14px;border:1px solid var(--border2);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
  .btn-ghost:hover{background:var(--surface2);color:var(--text);}
  .btn-primary{height:36px;padding:0 18px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn-primary:hover{background:var(--blue-dark);}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .stat-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--hint);margin-bottom:5px;}
  .stat-value{font-size:24px;font-weight:600;color:var(--text);line-height:1;}
  .stat-value.blue{color:var(--blue);}
  .stat-value.green{color:var(--green-text);}
  .stat-value.amber{color:var(--amber-text);}
  .stat-value.purple{color:var(--purple-text);}

  /* Agent links card */
  .links-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;}
  .card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
  .link-gen-row{display:flex;gap:8px;}
  .field{flex:1;height:40px;padding:0 13px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;}
  .field:focus{outline:none;border-color:var(--blue);background:var(--surface);}
  .field::placeholder{color:var(--hint);}
  .generated-links{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
  .link-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
  .link-agent{font-size:13px;font-weight:600;color:var(--text);min-width:120px;}
  .link-url{font-size:12px;color:var(--blue);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .btn-copy{height:26px;padding:0 10px;border:1px solid var(--border2);border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn-copy:hover{background:var(--surface2);color:var(--text);}
  .btn-copy.copied{background:var(--green-bg);color:var(--green-text);border-color:#C0DD97;}

  /* Referrals table */
  .referrals-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
  .filter-tabs{display:flex;gap:4px;}
  .tab{height:28px;padding:0 11px;border:1px solid var(--border2);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;}
  .tab:hover{background:var(--surface2);}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}

  .ref-row{display:grid;grid-template-columns:140px 1fr 110px 110px 100px 110px;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background 0.1s;}
  .ref-row:last-child{border-bottom:none;}
  .ref-row:hover{background:var(--bg);}
  .ref-agent{font-size:12px;font-weight:600;color:var(--blue);}
  .ref-agent-code{font-size:10px;color:var(--hint);margin-top:1px;}
  .ref-biz{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ref-contact{font-size:11px;color:var(--hint);}
  .badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;white-space:nowrap;}
  .badge-new{background:var(--blue-light);color:var(--blue);}
  .badge-active{background:var(--green-bg);color:var(--green-text);}
  .badge-working{background:var(--amber-bg);color:var(--amber-text);}
  .badge-closed{background:var(--gray-bg);color:var(--gray-text);}
  .status-select{height:28px;padding:0 6px;border:1px solid var(--border2);border-radius:6px;font-size:11px;cursor:pointer;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;width:100%;}
  .residual-input{height:28px;width:100%;padding:0 8px;border:1px solid var(--border2);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
  .residual-input:focus{outline:none;border-color:var(--blue);}
  .commission-val{font-size:13px;font-weight:600;color:var(--green-text);}

  /* Agent summary */
  .agent-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;}
  .agent-cards{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
  .agent-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:160px;}
  .agent-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .agent-card-stats{font-size:12px;color:var(--muted);}
  .agent-card-owed{font-size:15px;font-weight:600;color:var(--green-text);margin-top:4px;}

  .empty-state{padding:3rem;text-align:center;color:var(--hint);font-size:14px;}
  .loading-state{padding:2rem;text-align:center;color:var(--muted);font-size:13px;}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.65s linear infinite;margin-bottom:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:700px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .ref-row{grid-template-columns:1fr 90px 80px;}
    .ref-row .ref-agent,.ref-row .residual-input,.ref-row .commission-val{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <span class="logo-rms">RMS</span>
      <span class="logo-name">Lead Engine<span class="logo-page"> · Referral Admin</span></span>
    </div>
    <div class="header-actions">
      <a href="/"><button class="btn-ghost">← Lead CRM</button></a>
      <button class="btn-ghost" onclick="exportCSV()">Export CSV</button>
      <button class="btn-primary" onclick="loadReferrals()">Refresh</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total referrals</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat"><div class="stat-label">Active accounts</div><div class="stat-value green" id="stat-active">0</div></div>
    <div class="stat"><div class="stat-label">Total agents</div><div class="stat-value blue" id="stat-agents">0</div></div>
    <div class="stat"><div class="stat-label">Commissions owed</div><div class="stat-value purple" id="stat-commission">$0</div></div>
  </div>

  <!-- Agent link generator -->
  <div class="links-card">
    <div class="card-title">Agent referral links</div>
    <div class="link-gen-row">
      <input class="field" type="text" id="new-agent-name" placeholder="Agent name (e.g. Mike Johnson)" />
      <button class="btn-primary" onclick="generateLink()">Generate link</button>
    </div>
    <div class="generated-links" id="generated-links"></div>
  </div>

  <!-- Agent commission summary -->
  <div class="agent-summary" id="agent-summary" style="display:none;">
    <div class="card-title">This month — commissions owed</div>
    <div class="agent-cards" id="agent-cards"></div>
  </div>

  <!-- Referrals list -->
  <div class="referrals-card">
    <div class="table-toolbar">
      <span style="font-size:13px;font-weight:600;color:var(--text);" id="ref-count">Referrals</span>
      <div class="filter-tabs">
        <button class="tab active" onclick="filterRefs('all',this)">All</button>
        <button class="tab" onclick="filterRefs('New',this)">New</button>
        <button class="tab" onclick="filterRefs('Working',this)">Working</button>
        <button class="tab" onclick="filterRefs('Active',this)">Active</button>
      </div>
    </div>
    <div id="ref-list">
      <div class="loading-state"><div class="spinner"></div><br>Loading referrals...</div>
    </div>
  </div>
</div>

<script>
  let allRefs = [];
  let currentFilter = 'all';
  const savedLinks = JSON.parse(localStorage.getItem('rms_agent_links') || '[]');

  function badgeClass(s){
    return{'New':'badge-new','Working':'badge-working','Active':'badge-active','Closed':'badge-closed'}[s]||'badge-new';
  }

  function updateStats(){
    const active = allRefs.filter(r=>r.status==='Active');
    const agents = [...new Set(allRefs.map(r=>r.agent_code))];
    const totalOwed = allRefs.reduce((s,r)=>s+(parseFloat(r.commission_owed)||0),0);
    document.getElementById('stat-total').textContent = allRefs.length;
    document.getElementById('stat-active').textContent = active.length;
    document.getElementById('stat-agents').textContent = agents.length;
    document.getElementById('stat-commission').textContent = '$'+totalOwed.toFixed(2);
  }

  function renderAgentSummary(){
    const agentMap = {};
    allRefs.forEach(r=>{
      if(!agentMap[r.agent_name]) agentMap[r.agent_name]={refs:0,active:0,owed:0};
      agentMap[r.agent_name].refs++;
      if(r.status==='Active') agentMap[r.agent_name].active++;
      agentMap[r.agent_name].owed += parseFloat(r.commission_owed)||0;
    });
    const names = Object.keys(agentMap);
    if(!names.length){document.getElementById('agent-summary').style.display='none';return;}
    document.getElementById('agent-summary').style.display='block';
    document.getElementById('agent-cards').innerHTML = names.map(name=>{
      const a = agentMap[name];
      return '<div class="agent-card">'+
        '<div class="agent-card-name">'+esc(name)+'</div>'+
        '<div class="agent-card-stats">'+a.refs+' referrals · '+a.active+' active</div>'+
        '<div class="agent-card-owed">$'+a.owed.toFixed(2)+' owed</div>'+
        '</div>';
    }).join('');
  }

  function renderRefs(){
    const list = document.getElementById('ref-list');
    const filtered = currentFilter==='all' ? allRefs : allRefs.filter(r=>r.status===currentFilter);
    document.getElementById('ref-count').textContent = 'Referrals ('+filtered.length+')';
    if(!filtered.length){
      list.innerHTML='<div class="empty-state">'+(allRefs.length?'No referrals match this filter.':'No referrals yet. Share your agent links to get started.')+'</div>';
      return;
    }
    list.innerHTML = filtered.map(ref=>{
      const opts = ['New','Working','Active','Closed'].map(s=>'<option value="'+s+'"'+(ref.status===s?' selected':'')+'>'+s+'</option>').join('');
      return '<div class="ref-row">'+
        '<div><div class="ref-agent">'+esc(ref.agent_name)+'</div><div class="ref-agent-code">'+esc(ref.agent_code)+'</div></div>'+
        '<div><div class="ref-biz">'+esc(ref.business_name)+'</div><div class="ref-contact">'+(ref.owner_name?esc(ref.owner_name)+' · ':'')+esc(ref.phone)+'</div></div>'+
        '<select class="status-select" onchange="updateRef(\''+ref.id+'\',{status:this.value})">'+opts+'</select>'+
        '<span class="badge '+badgeClass(ref.status)+'">'+ref.status+'</span>'+
        '<input class="residual-input" type="number" placeholder="$0 residual" value="'+(ref.monthly_residual||'')+'" onblur="updateRef(\''+ref.id+'\',{monthly_residual:parseFloat(this.value)||0})" />'+
        '<div class="commission-val">$'+((parseFloat(ref.commission_owed)||0).toFixed(2))+'</div>'+
        '</div>';
    }).join('');
  }

  function filterRefs(f,btn){
    currentFilter=f;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    renderRefs();
  }

  async function loadReferrals(){
    try{
      const res = await fetch('/api/referrals');
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      allRefs = data.referrals || [];
      updateStats();
      renderAgentSummary();
      renderRefs();
    }catch(e){
      document.getElementById('ref-list').innerHTML='<div class="empty-state">Could not load referrals. Make sure Supabase is configured.</div>';
    }
  }

  async function updateRef(id, updates){
    try{
      const res = await fetch('/api/referrals',{
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id,...updates}),
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      const idx = allRefs.findIndex(r=>r.id===id);
      if(idx>-1) allRefs[idx]={...allRefs[idx],...data.referral};
      updateStats(); renderAgentSummary(); renderRefs();
    }catch(e){ console.error(e); }
  }

  function generateLink(){
    const name = document.getElementById('new-agent-name').value.trim();
    if(!name) return;
    const code = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    const url = window.location.origin+'/refer.html?agent='+code;
    const existing = savedLinks.find(l=>l.code===code);
    if(!existing) savedLinks.push({name,code,url});
    localStorage.setItem('rms_agent_links', JSON.stringify(savedLinks));
    document.getElementById('new-agent-name').value='';
    renderLinks();
  }

  function renderLinks(){
    const container = document.getElementById('generated-links');
    if(!savedLinks.length){container.innerHTML='';return;}
    container.innerHTML = savedLinks.map((l,i)=>'<div class="link-row">'+
      '<span class="link-agent">'+esc(l.name)+'</span>'+
      '<span class="link-url">'+esc(l.url)+'</span>'+
      '<button class="btn-copy" id="copy-'+i+'" onclick="copyLink(\''+esc(l.url)+'\','+i+')">Copy</button>'+
      '</div>'
    ).join('');
  }

  function copyLink(url, idx){
    navigator.clipboard.writeText(url).then(()=>{
      const btn = document.getElementById('copy-'+idx);
      btn.textContent='Copied!'; btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
    });
  }

  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function exportCSV(){
    if(!allRefs.length)return;
    const rows=[['Agent','Business','Owner','Phone','Email','Relationship','Status','Monthly Residual','Commission Owed','Notes','Submitted'],
      ...allRefs.map(r=>[r.agent_name,r.business_name,r.owner_name,r.phone,r.email,r.relationship,r.status,r.monthly_residual,r.commission_owed,r.notes,r.created_at])];
    const csv=rows.map(r=>r.map(c=>'"'+(c||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='rms_referrals.csv';a.click();
  }

  renderLinks();
  loadReferrals();
</script>
</body>
</html>
