<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMS Lead Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.16);
    --text: #1a1917;
    --muted: #6b6a66;
    --hint: #9e9d99;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --green-bg: #EAF3DE;
    --green-text: #3B6D11;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --gray-bg: #F1EFE8;
    --gray-text: #5F5E5A;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --red-border: #F09595;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .logo-rms {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--blue);
    text-transform: uppercase;
    background: var(--blue-light);
    padding: 3px 8px;
    border-radius: 5px;
  }

  .logo-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-ghost {
    height: 32px;
    padding: 0 14px;
    border: 1px solid var(--border2);
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--hint);
    margin-bottom: 5px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.blue { color: var(--blue); }
  .stat-value.green { color: var(--green-text); }
  .stat-value.amber { color: var(--amber-text); }

  /* Search card */
  .search-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .search-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field {
    flex: 1;
    height: 40px;
    padding: 0 13px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .field:focus { outline: none; border-color: var(--blue); background: var(--surface); }
  .field::placeholder { color: var(--hint); }

  .btn-primary {
    height: 40px;
    padding: 0 22px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { background: var(--surface2); color: var(--hint); cursor: not-allowed; }

  .error-box {
    background: var(--red-bg);
    color: var(--red-text);
    border: 1px solid var(--red-border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }

  /* Leads table */
  .leads-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .leads-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
  }

  .leads-count {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    height: 28px;
    padding: 0 11px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .tab:hover { background: var(--surface2); }
  .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* Lead rows */
  .lead-row {
    display: grid;
    grid-template-columns: 40px 1fr 130px 90px 140px;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .lead-row:last-child { border-bottom: none; }
  .lead-row:hover { background: var(--bg); }

  .lead-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--blue-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--blue);
    flex-shrink: 0;
  }

  .lead-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lead-address {
    font-size: 11px;
    color: var(--hint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lead-type {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .badge-new { background: var(--blue-light); color: var(--blue); }
  .badge-contacted { background: var(--green-bg); color: var(--green-text); }
  .badge-followup { background: var(--amber-bg); color: var(--amber-text); }
  .badge-closed { background: var(--green-bg); color: var(--green-text); }
  .badge-dead { background: var(--gray-bg); color: var(--gray-text); }

  .status-select {
    height: 30px;
    padding: 0 8px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    width: 100%;
  }
  .status-select:focus { outline: none; border-color: var(--blue); }

  .empty-state {
    padding: 3.5rem 1rem;
    text-align: center;
    color: var(--hint);
    font-size: 14px;
    line-height: 1.6;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
  }

  .loading-state {
    padding: 2.5rem;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 22px;
    height: 22px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .lead-row { grid-template-columns: 36px 1fr 80px; }
    .lead-row .lead-type,
    .lead-row .status-select { display: none; }
    .search-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <span class="logo-rms">RMS</span>
      <span class="logo-name">Lead Engine</span>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" onclick="clearLeads()">Clear all</button>
      <button class="btn-ghost" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total leads</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">New</div>
      <div class="stat-value blue" id="stat-new">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Contacted</div>
      <div class="stat-value green" id="stat-contacted">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Follow-up</div>
      <div class="stat-value amber" id="stat-followup">0</div>
    </div>
  </div>

  <div class="search-card">
    <div class="search-card-title">Find new leads</div>
    <div class="search-row">
      <input class="field" type="text" id="city-input" placeholder="City or zip (e.g. Tampa, FL)" />
      <select class="field" id="biz-type" style="flex: 0 0 180px;">
        <option value="hair salon">Hair salons</option>
        <option value="nail salon">Nail salons</option>
        <option value="auto repair">Auto repair shops</option>
        <option value="spa">Spas &amp; wellness</option>
        <option value="barber shop">Barber shops</option>
        <option value="dry cleaner">Dry cleaners</option>
        <option value="massage therapy">Massage therapy</option>
        <option value="tattoo shop">Tattoo shops</option>
        <option value="pet grooming">Pet grooming</option>
        <option value="laundromat">Laundromats</option>
        <option value="restaurant">Restaurants</option>
        <option value="retail store">Retail stores</option>
      </select>
      <button class="btn-primary" id="search-btn" onclick="searchLeads()">Find leads</button>
    </div>
    <div id="error-msg" class="error-box"></div>
  </div>

  <div class="leads-card">
    <div class="leads-toolbar">
      <span class="leads-count" id="leads-count">Your leads</span>
      <div class="filter-tabs">
        <button class="tab active" onclick="filterLeads('all', this)">All</button>
        <button class="tab" onclick="filterLeads('New', this)">New</button>
        <button class="tab" onclick="filterLeads('Contacted', this)">Contacted</button>
        <button class="tab" onclick="filterLeads('Follow-up', this)">Follow-up</button>
      </div>
    </div>
    <div id="leads-list">
      <div class="empty-state">
        <span class="empty-icon">🗂</span>
        Search a city above to pull leads automatically.
      </div>
    </div>
  </div>

</div>

<script>
  let allLeads = JSON.parse(localStorage.getItem('rms_leads_v2') || '[]');
  let currentFilter = 'all';

  function save() {
    try { localStorage.setItem('rms_leads_v2', JSON.stringify(allLeads)); } catch(e) {}
  }

  function initials(name) {
    return name.split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase();
  }

  function badgeClass(s) {
    const m = { 'New': 'badge-new', 'Contacted': 'badge-contacted', 'Follow-up': 'badge-followup', 'Closed': 'badge-closed', 'Not interested': 'badge-dead' };
    return m[s] || 'badge-new';
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allLeads.length;
    document.getElementById('stat-new').textContent = allLeads.filter(l => l.status === 'New').length;
    document.getElementById('stat-contacted').textContent = allLeads.filter(l => l.status === 'Contacted').length;
    document.getElementById('stat-followup').textContent = allLeads.filter(l => l.status === 'Follow-up').length;
  }

  function renderLeads() {
    const list = document.getElementById('leads-list');
    const filtered = currentFilter === 'all' ? allLeads : allLeads.filter(l => l.status === currentFilter);
    document.getElementById('leads-count').textContent = 'Your leads (' + filtered.length + ')';

    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">🗂</span>' +
        (allLeads.length ? 'No leads match this filter.' : 'Search a city above to pull leads automatically.') +
        '</div>';
      return;
    }

    list.innerHTML = filtered.map(lead => {
      const idx = allLeads.indexOf(lead);
      const statusOpts = ['New', 'Contacted', 'Follow-up', 'Closed', 'Not interested']
        .map(s => '<option value="' + s + '"' + (lead.status === s ? ' selected' : '') + '>' + s + '</option>')
        .join('');
      return '<div class="lead-row">' +
        '<div class="lead-avatar">' + initials(lead.name) + '</div>' +
        '<div><div class="lead-name">' + esc(lead.name) + '</div><div class="lead-address">' + esc(lead.address) + '</div></div>' +
        '<div class="lead-type">' + esc(lead.type) + '</div>' +
        '<span class="badge ' + badgeClass(lead.status) + '">' + lead.status + '</span>' +
        '<select class="status-select" onchange="updateStatus(' + idx + ', this.value)">' + statusOpts + '</select>' +
        '</div>';
    }).join('');
  }

  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateStatus(idx, status) {
    allLeads[idx].status = status;
    save();
    updateStats();
    renderLeads();
  }

  function filterLeads(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderLeads();
  }

  async function searchLeads() {
    const city = document.getElementById('city-input').value.trim();
    const type = document.getElementById('biz-type').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!city) { errEl.textContent = 'Enter a city or zip code first.'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.textContent = 'Searching...';
    document.getElementById('leads-list').innerHTML = '<div class="loading-state"><div class="spinner"></div><br>Finding ' + type + 's near ' + city + '...</div>';

    try {
      const res = await fetch('/api/places?city=' + encodeURIComponent(city) + '&type=' + encodeURIComponent(type));
      const data = await res.json();

      if (!res.ok || data.error) throw new Error(data.error || 'Search failed.');
      if (!data.results || !data.results.length) throw new Error('No businesses found. Try a different city or type.');

      const newLeads = data.results.map(p => ({
        id: p.place_id,
        name: p.name,
        address: p.vicinity || '',
        phone: '',
        type: type,
        status: 'New',
        addedAt: new Date().toLocaleDateString()
      }));

      const existingIds = new Set(allLeads.map(l => l.id));
      const fresh = newLeads.filter(l => !existingIds.has(l.id));
      allLeads = [...fresh, ...allLeads];
      save();
      updateStats();
      currentFilter = 'all';
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
      renderLeads();

      if (fresh.length === 0) {
        errEl.textContent = 'All ' + newLeads.length + ' results are already in your list.';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      document.getElementById('leads-list').innerHTML = '<div class="empty-state">Search failed. See error above.</div>';
    }

    btn.disabled = false;
    btn.textContent = 'Find leads';
  }

  function exportCSV() {
    if (!allLeads.length) return;
    const rows = [['Name', 'Address', 'Phone', 'Type', 'Status', 'Added'],
      ...allLeads.map(l => [l.name, l.address, l.phone, l.type, l.status, l.addedAt])];
    const csv = rows.map(r => r.map(c => '"' + (c || '').replace(/"/g, '""') + '"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'rms_leads.csv';
    a.click();
  }

  function clearLeads() {
    if (!allLeads.length) return;
    if (confirm('Clear all ' + allLeads.length + ' leads? This cannot be undone.')) {
      allLeads = [];
      save();
      updateStats();
      renderLeads();
    }
  }

  updateStats();
  renderLeads();
</script>
</body>
</html>
